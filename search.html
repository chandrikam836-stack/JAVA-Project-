<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Management System – Search</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2c3e50;--accent:#3498db;--success:#2ecc71;
  --danger:#e74c3c;--gold:#f39c12;--purple:#8e44ad;
  --bg:#f4f6f9;--card:#fff;--shadow:0 4px 16px rgba(0,0,0,.09);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#333;min-height:100vh}

header{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);position:sticky;top:0;z-index:100}
nav{display:flex;justify-content:space-between;align-items:center;padding:.85rem 2rem;max-width:1300px;margin:0 auto;gap:1rem;flex-wrap:wrap}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--primary);cursor:pointer;white-space:nowrap;text-decoration:none}
.menu{display:flex;list-style:none;gap:1.2rem}
.menu a{text-decoration:none;color:#555;font-weight:500;font-size:.9rem;transition:color .2s}
.menu a:hover,.menu a.active{color:var(--accent)}
.search-wrap{display:flex;flex:1;max-width:520px}
.search-wrap select{padding:.48rem .7rem;border:1px solid #ddd;border-right:none;border-radius:6px 0 0 6px;background:#f8f8f8;font-size:.85rem;cursor:pointer}
.search-wrap input{flex:1;padding:.48rem .75rem;border:1px solid #ddd;font-size:.88rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap button{padding:.48rem .85rem;background:var(--accent);border:none;border-radius:0 6px 6px 0;color:#fff;cursor:pointer;transition:background .2s}
.search-wrap button:hover{background:#2382c4}
.auth-btns{display:flex;align-items:center;gap:.4rem}
.auth-btns span{font-weight:500;color:var(--primary);font-size:.88rem;white-space:nowrap}
.auth-btns button{padding:.4rem .9rem;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:500;font-family:inherit;transition:opacity .2s}
.btn-login{background:var(--accent);color:#fff}
.btn-signup{background:var(--success);color:#fff}
.btn-logout{background:var(--danger);color:#fff}

main{max-width:1300px;margin:0 auto;padding:2rem}
.back-lnk{display:inline-flex;align-items:center;gap:.4rem;color:var(--accent);font-weight:500;font-size:.88rem;
  margin-bottom:1.25rem;cursor:pointer;border:none;background:none;font-family:inherit;text-decoration:none}
.back-lnk:hover{text-decoration:underline}
.results-bar{display:flex;align-items:baseline;gap:.75rem;margin-bottom:.5rem;flex-wrap:wrap}
.results-bar h1{font-family:'Playfair Display',serif;font-size:1.75rem;color:var(--primary);animation:fadeUp .4s ease both}
.res-count{color:#888;font-size:.9rem}
.free-bar{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;
  background:linear-gradient(135deg,#eafaf1,#d5f5e3);border:1px solid #a9dfbf;border-radius:10px;
  padding:.65rem 1.1rem;margin-bottom:1.5rem;font-size:.85rem;color:#1e8449}
.free-bar strong{font-weight:600}

.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1.25rem}
.book-card{background:#fff;border-radius:10px;box-shadow:var(--shadow);padding:.9rem;text-align:center;
  position:relative;transition:transform .2s,box-shadow .2s;cursor:pointer;
  animation:fadeUp .35s ease both;display:flex;flex-direction:column}
.book-card:hover{transform:translateY(-5px);box-shadow:0 10px 28px rgba(0,0,0,.14)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.book-cover{width:100%;height:220px;object-fit:cover;border-radius:7px;margin-bottom:.7rem;background:#e8ecf0}
.cover-ph{width:100%;height:220px;border-radius:7px;margin-bottom:.7rem;
  background:linear-gradient(135deg,#dde3ea,#c8d1db);display:flex;align-items:center;justify-content:center;font-size:2.8rem;color:#9aaabb}
.book-title{font-weight:600;font-size:.88rem;color:var(--primary);margin-bottom:.2rem;line-height:1.3}
.book-author{color:#888;font-size:.8rem;margin-bottom:.4rem}
.book-genre{font-size:.73rem;color:#aaa;margin-bottom:.6rem}
.ribbon{position:absolute;top:8px;left:8px;font-size:.65rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;letter-spacing:.4px;color:#fff;z-index:2}
.r-gutenberg{background:#8e44ad}.r-mit{background:#c0392b}.r-arxiv{background:#b7410e}
.r-openlibrary{background:#2980b9}.r-authorpdf{background:#16a085}.r-cambridge{background:#1a5276}
.r-springer{background:#e67e22}.r-htmlbook{background:#27ae60}.r-github{background:#2c3e50}
.src-pill{display:inline-flex;align-items:center;gap:.3rem;font-size:.7rem;color:#777;margin-bottom:.4rem;flex-wrap:wrap;justify-content:center}
.src-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-gutenberg{background:#8e44ad}.dot-mit{background:#c0392b}.dot-arxiv{background:#b7410e}
.dot-openlibrary{background:#2980b9}.dot-authorpdf{background:#16a085}.dot-cambridge{background:#1a5276}
.dot-springer{background:#e67e22}.dot-htmlbook{background:#27ae60}.dot-github{background:#2c3e50}
.card-btns{display:flex;gap:.35rem;margin-top:auto;padding-top:.5rem}
.card-btns a{flex:1;padding:.38rem .2rem;border:none;border-radius:5px;font-size:.76rem;font-weight:600;
  font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.25rem;text-decoration:none;transition:opacity .2s}
.card-btns a:hover{opacity:.83}
.cb-read{background:var(--success);color:#fff}
.level-tag{display:inline-block;font-size:.7rem;padding:.15rem .5rem;border-radius:4px;font-weight:700;margin-left:.4rem;vertical-align:middle}
.lv-beginner{background:#d5f5e3;color:#1e8449}
.lv-intermediate{background:#d6eaf8;color:#1a5276}
.lv-advanced{background:#fde8e8;color:#922b21}

.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;text-align:center;gap:1rem}
.not-found .nf-ico{font-size:4rem;color:#c8d0da}
.not-found h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--primary)}
.not-found p{color:#888;max-width:340px}
.try-btn{margin-top:.75rem;padding:.55rem 1.4rem;background:var(--accent);color:#fff;border:none;border-radius:7px;
  cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:500;text-decoration:none;display:inline-block}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;justify-content:center;align-items:center;padding:1rem}
.overlay.open{display:flex}
.detail-box{background:#fff;border-radius:16px;max-width:660px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;
  position:relative;animation:slideUp .25s ease;box-shadow:0 16px 48px rgba(0,0,0,.28)}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.detail-head{background:linear-gradient(135deg,#2c3e50,#34495e);padding:1.75rem;display:flex;gap:1.4rem;color:#fff;align-items:flex-start;flex-shrink:0}
.detail-cover{width:105px;height:155px;object-fit:cover;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.45);flex-shrink:0}
.detail-cover-ph{width:105px;height:155px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0}
.detail-info h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:.3rem;line-height:1.3}
.detail-meta span{display:inline-block;background:rgba(255,255,255,.15);font-size:.75rem;padding:.2rem .55rem;border-radius:20px;margin:.15rem .15rem .15rem 0}
.det-author{color:rgba(255,255,255,.8);margin-bottom:.5rem;font-size:.92rem}
.detail-body{padding:1.5rem;overflow-y:auto;flex:1}
.dl-head{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--primary);margin-bottom:.85rem}
.dl-grid{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.25rem}
.dl-btn{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem 1rem;border:none;border-radius:7px;
  cursor:pointer;font-size:.83rem;font-weight:600;font-family:inherit;text-decoration:none;color:#fff;transition:opacity .2s,transform .1s}
.dl-btn:hover{opacity:.85;transform:translateY(-1px)}
.note-box{background:#f0f4f8;border-radius:8px;padding:.7rem 1rem;font-size:.81rem;color:#555;display:flex;gap:.5rem;align-items:flex-start}
.note-box i{color:var(--accent);margin-top:2px;flex-shrink:0}
.det-close{position:absolute;top:.85rem;right:.85rem;background:rgba(255,255,255,.2);border:none;color:#fff;
  width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background .2s}
.det-close:hover{background:rgba(255,255,255,.35)}
.src-gutenberg{background:#8e44ad}.src-mit{background:#c0392b}.src-arxiv{background:#b7410e}
.src-openlibrary{background:#2980b9}.src-authorpdf{background:#16a085}.src-cambridge{background:#1a5276}
.src-springer{background:#e67e22}.src-htmlbook{background:#27ae60}.src-github{background:#2c3e50}

@media(max-width:768px){
  nav{flex-direction:column;padding:.75rem}
  .search-wrap{max-width:100%;width:100%}
  .books-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:1rem}
  .detail-head{flex-direction:column;align-items:center;text-align:center}
}
</style>
</head>
<body>

<header>
<nav>
  <a class="logo" href="Home.html">📚 Library Management System</a>
  <ul class="menu"><li><a href="Home.html">Home</a></li></ul>
  <div class="search-wrap">
    <select id="searchCat">
      <option>All</option><option>Title</option><option>Author</option><option>Genre</option>
    </select>
    <input type="text" id="searchQ" placeholder="Search books here…">
    <button onclick="doSearch()"><i class="fas fa-search"></i></button>
  </div>
  <div class="auth-btns">
    <span id="wlcUser"></span>
    <button class="btn-login" id="btnLogin" onclick="window.location.href='Login_jp.html'">Login</button>
    <button class="btn-signup" id="btnSignup" onclick="window.location.href='register (2).html'">Sign Up</button>
    <button class="btn-logout" id="btnLogout" style="display:none" onclick="doLogout()">Logout</button>
  </div>
</nav>
</header>

<main>
  <a class="back-lnk" href="Home.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
  <div class="results-bar">
    <h1 id="resTitle">Search Results</h1>
    <span id="resCount" class="res-count"></span>
  </div>
  <div class="free-bar">
    <i class="fas fa-check-circle"></i>
    <div><strong>All books are free!</strong> Results from our curated library — Project Gutenberg, MIT Press, arXiv, Open Library &amp; more. 100% free &amp; legal.</div>
  </div>
  <div id="resArea"></div>
</main>

<div class="overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box">
    <button class="det-close" onclick="closeDetail()"><i class="fas fa-times"></i></button>
    <div id="detContent"></div>
  </div>
</div>

<script>

  {id:334,title:"Graphic Design: The New Basics",author:"Lupton & Phillips",year:2015,genre:"Arts & Crafts",cover:"https://covers.openlibrary.org/b/isbn/9781616895723-L.jpg",read:"https://openlibrary.org/works/OL17357810W",source:"openlibrary",level:"beginner",desc:"A foundational graphic design textbook covering point, line, plane, rhythm, pattern, and visual hierarchy."},
  {id:335,title:"Color and Light — James Gurney",author:"James Gurney",year:2010,genre:"Arts & Crafts",cover:"https://covers.openlibrary.org/b/isbn/9780740797712-L.jpg",read:"https://openlibrary.org/works/OL15523953W",source:"openlibrary",level:"intermediate",desc:"A guide to painting luminous colour and realistic light. Covers colour temperature and form shadow."},
  {id:336,title:"The Elements of Typographic Style",author:"Robert Bringhurst",year:1992,genre:"Arts & Crafts",cover:"https://covers.openlibrary.org/b/isbn/9780881792126-L.jpg",read:"https://openlibrary.org/works/OL3915041W",source:"openlibrary",level:"intermediate",desc:"Called the typographer's bible — covers type anatomy, rhythm, proportion, and the history of letterforms."},
];

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function getLevelBadge(level){
  if(!level||level==="all") return '';
  const m={beginner:'lv-beginner',intermediate:'lv-intermediate',advanced:'lv-advanced'};
  return `<span class="level-tag ${m[level]||''}">${level.charAt(0).toUpperCase()+level.slice(1)}</span>`;
}

function makeCard(book, delay=0){
  const s = SOURCES[book.source]||SOURCES.gutenberg;
  return `<div class="book-card" style="animation-delay:${delay}ms" onclick="openDetail(${book.id})">
    <span class="ribbon ${s.ribbon}">${s.label.split(' ')[0].toUpperCase()}</span>
    ${book.cover
      ? `<img class="book-cover" src="${esc(book.cover)}" alt="${esc(book.title)}" loading="lazy" onerror="this.outerHTML='<div class=\\'cover-ph\\'><i class=\\'fas fa-book\\'></i></div>'">`
      : `<div class="cover-ph"><i class="fas fa-book"></i></div>`}
    <div class="book-title">${esc(book.title)}</div>
    <div class="book-author">${esc(book.author)}</div>
    <div class="book-genre">${esc(book.genre||'')}</div>
    <div class="src-pill"><span class="src-dot ${s.dot}"></span>${s.label}</div>
    <div class="card-btns">
      <a class="cb-read" href="${esc(book.read)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
        <i class="fas fa-book-reader"></i> Read
      </a>
    </div>
  </div>`;
}

function openDetail(id){
  const book = BOOKS.find(b=>b.id===id);
  if(!book) return;
  const s = SOURCES[book.source]||SOURCES.gutenberg;
  const coverHtml = book.cover
    ? `<img class="detail-cover" src="${esc(book.cover)}" alt="${esc(book.title)}" onerror="this.outerHTML='<div class=\\'detail-cover-ph\\'><i class=\\'fas fa-book\\'></i></div>'">`
    : `<div class="detail-cover-ph"><i class="fas fa-book"></i></div>`;
  const levelBadge = getLevelBadge(book.level);
  const meta = [
    book.year ? `<span><i class="fas fa-calendar"></i> ${book.year>0?book.year:Math.abs(book.year)+' BCE'}</span>` : '',
    `<span><i class="fas fa-tag"></i> ${book.genre||'Book'}</span>`,
    `<span><i class="fas fa-unlock-alt"></i> Free & Legal</span>`,
    book.level&&book.level!=="all"?`<span><i class="fas fa-signal"></i> ${book.level.charAt(0).toUpperCase()+book.level.slice(1)}</span>`:''
  ].filter(Boolean).join('');
  const noteMap = {
    gutenberg:"This book is in the public domain and freely available on <strong>Project Gutenberg</strong>.",
    mit:"This book is officially free from <strong>MIT Press</strong>. The publisher has made the full text openly available.",
    arxiv:"This paper/book is freely available on <strong>arXiv.org</strong>, the open-access academic preprint server.",
    openlibrary:"Available on <strong>Open Library</strong> — you can read online or borrow digitally for free.",
    authorpdf:"The <strong>author(s) have officially released this book as a free PDF</strong> on their personal or institutional website.",
    cambridge:"Freely available from <strong>Cambridge University Press</strong> as part of their open access programme.",
    springer:"Freely available from <strong>Springer</strong> as part of their open access programme.",
    htmlbook:"Freely readable as an <strong>open-access HTML book</strong> — no download required, just open in your browser.",
    github:"All code and/or content is freely available on <strong>GitHub</strong>.",
  };
  const note = noteMap[book.source]||"This resource is freely and legally available online.";
  document.getElementById('detContent').innerHTML = `
    <div class="detail-head">
      ${coverHtml}
      <div class="detail-info">
        <h2>${esc(book.title)}${levelBadge}</h2>
        <div class="det-author">by ${esc(book.author)}</div>
        <div class="detail-meta">${meta}</div>
        <div class="src-pill" style="margin-top:.6rem"><span class="src-dot ${s.dot}"></span>${s.label}</div>
      </div>
    </div>
    <div class="detail-body">
      <p style="color:#555;font-size:.9rem;line-height:1.7;margin-bottom:1.25rem">${esc(book.desc||'')}</p>
      <div class="dl-head"><i class="fas fa-external-link-alt"></i> Free Access</div>
      <div class="dl-grid">
        <a class="dl-btn ${s.btn}" href="${esc(book.read)}" target="_blank" rel="noopener noreferrer">
          <i class="fas ${s.icon}"></i> Open on ${s.label}
        </a>
      </div>
      <div class="note-box"><i class="fas fa-info-circle"></i><span>${note}</span></div>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){ document.getElementById('detailOverlay').classList.remove('open'); }

function doSearch(){
  const raw = document.getElementById('searchQ').value.trim();
  const cat = document.getElementById('searchCat').value;
  if(!raw){ document.getElementById('searchQ').focus(); return; }
  window.location.href = `search.html?q=${encodeURIComponent(raw)}&cat=${encodeURIComponent(cat)}`;
}
document.getElementById('searchQ').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDetail(); });

function updateAuth(){
  const ok = localStorage.getItem('lms_login')==='1';
  const name = localStorage.getItem('lms_name')||'User';
  document.getElementById('wlcUser').textContent = ok ? `Welcome, ${name}` : '';
  document.getElementById('btnLogin').style.display  = ok?'none':'';
  document.getElementById('btnSignup').style.display = ok?'none':'';
  document.getElementById('btnLogout').style.display = ok?'':'none';
}
function doLogout(){
  localStorage.removeItem('lms_login');
  localStorage.removeItem('lms_name');
  updateAuth();
  window.location.href='Home.html';
}

function runSearch(q, cat){
  const lq = q.toLowerCase();
  const results = BOOKS.filter(b=>{
    if(cat==="Genre")  return (b.genre||'').toLowerCase().includes(lq);
    if(cat==="Author") return b.author.toLowerCase().includes(lq);
    if(cat==="Title")  return b.title.toLowerCase().includes(lq);
    return b.title.toLowerCase().includes(lq)
        || b.author.toLowerCase().includes(lq)
        || (b.genre||'').toLowerCase().includes(lq)
        || (b.desc||'').toLowerCase().includes(lq);
  });
  document.getElementById('resCount').textContent = `${results.length} book${results.length!==1?'s':''} found`;
  if(!results.length){
    document.getElementById('resArea').innerHTML = `<div class="not-found">
      <div class="nf-ico"><i class="fas fa-book-open"></i></div>
      <h2>No books found</h2>
      <p>Try a different title, author, or genre.</p>
      <a class="try-btn" href="Home.html">← Back to Home</a>
    </div>`;
    return;
  }
  document.getElementById('resArea').innerHTML = `<div class="books-grid">${results.map((b,i)=>makeCard(b,Math.min(i*30,500))).join('')}</div>`;
}

// Init
updateAuth();
const params = new URLSearchParams(window.location.search);
const q   = params.get('q') || '';
const cat = params.get('cat') || 'All';

if(q){
  document.getElementById('searchQ').value = q;
  const sel = document.getElementById('searchCat');
  for(let o of sel.options){ if(o.value===cat||o.text===cat){ sel.value=o.value; break; } }
  document.getElementById('resTitle').textContent = `Results for "${q}"`;
  runSearch(q, cat);
} else {
  document.getElementById('resArea').innerHTML = `<div class="not-found">
    <div class="nf-ico"><i class="fas fa-search"></i></div>
    <h2>Enter a search term</h2>
    <p>Use the search bar above to find books by title, author, or genre.</p>
    <a class="try-btn" href="Home.html">← Back to Home</a>
  </div>`;
}
</script>
</body>
</html>
